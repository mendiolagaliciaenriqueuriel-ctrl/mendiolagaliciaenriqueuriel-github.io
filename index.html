<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flowers 💖</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    font-family: Arial, sans-serif;
    text-align: center;

    background: linear-gradient(135deg, #ffe4ec, #ffd6e7, #ffc1d6);
    overflow: hidden;
}

/* FONDO BRILLITOS */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background-image: 
        radial-gradient(circle, rgba(255,255,255,0.6) 2px, transparent 2px),
        radial-gradient(circle, rgba(255,255,255,0.4) 3px, transparent 3px);
    background-size: 80px 80px, 120px 120px;
    animation: sparkle 20s linear infinite;
    z-index: 0;
}

@keyframes sparkle {
    from { transform: translateY(0); }
    to { transform: translateY(-200px); }
}

/* HOLA */
.greetings {
    font-size: 10vw;
    font-weight: bold;
    z-index: 2;
}

.greetings span {
    display: inline-block;
    color: #e91e63;
    animation: bounce 1.5s infinite;
}

.greetings span:nth-child(1){animation-delay:0s;}
.greetings span:nth-child(2){animation-delay:0.2s;}
.greetings span:nth-child(3){animation-delay:0.4s;}
.greetings span:nth-child(4){animation-delay:0.6s;}
.greetings span:nth-child(5){animation-delay:0.8s;}

@keyframes bounce {
    0%,100%{ transform: translateY(0);}
    50%{ transform: translateY(-15px);}
}

/* GATITO */
.cat {
    margin-top: 20px;
    z-index: 2;
    animation: floatCat 3s ease-in-out infinite;
}

.cat img {
    width: 60vw;
    max-width: 250px;
    filter: drop-shadow(0 0 10px rgba(255, 182, 193, 0.7));
}

@keyframes floatCat {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

/* TEXTO */
.description {
    margin-top: 20px;
    font-size: 4vw;
    color: #6a1b4d;
    max-width: 80%;
    z-index: 2;
}

/* BOTÓN */
.button {
    margin-top: 30px;
    z-index: 2;
}

.botones {
    padding: 12px 25px;
    font-size: 18px;
    background: linear-gradient(145deg, #ff4081, #e91e63);
    border: none;
    border-radius: 30px;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    transition: all 0.3s ease;
}

.botones:hover {
    transform: scale(1.1);
}

.botones a {
    text-decoration: none;
    color: white;
    font-weight: bold;
}

/* CORAZONES */
.heart {
    position: absolute;
    color: #ff4081;
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-250px); opacity: 0; }
}
</style>
</head>

<body>

<div class="greetings">
    <span>H</span>
    <span>o</span>
    <span>l</span>
    <span>a</span>
     <span></span>
     <span>c</span>
      <span>o</span>
       <span>r</span>
        <span>a</span>
         <span>z</span>
          <span>ó</span>
           <span>n</span>

    <span>!</span>
</div>


<div class="cat">
    <img src="gatito.png" alt="gatito con flores">
</div>

<div class="description">
    <span>Inicialmente quiero que sepas lo importante que eres para mi y lo mucho que te amo , mi niña.💖</span>
</div>

<div class="button">
    <button class="botones">
        <a href="flower.html">CLICK AQUÍ</a>
    </button>
</div>

<script>
/* MUCHOS CORAZONES 💖 */
setInterval(()=>{
    for(let i=0;i<3;i++){
        const h=document.createElement("div");
        h.className="heart";
        h.innerHTML = Math.random() > 0.5 ? "💖" : "💗";

        h.style.left = Math.random()*100 + "vw";
        h.style.fontSize = (12 + Math.random()*20) + "px";
        h.style.animationDuration = (3 + Math.random()*2) + "s";

        document.body.appendChild(h);

        setTimeout(()=>h.remove(),5000);
    }
},300);
</script>

</body>
</html>
