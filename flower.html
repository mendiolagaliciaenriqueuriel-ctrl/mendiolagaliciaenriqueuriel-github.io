<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARA LA MEJOR NOVIA  💛</title>
<body class="container">
    <audio src="sonadoreterno.mp3" autoplay></audio>
    <div id="lyrics">
     
    </div>
<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
}

body {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #fff0f5, #ffd6e7, #ffc1d6);
  overflow: hidden;
}


body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background-image: 
    radial-gradient(circle, rgba(255,255,255,0.6) 2px, transparent 2px),
    radial-gradient(circle, rgba(255,255,255,0.4) 3px, transparent 3px);
  background-size: 80px 80px, 120px 120px;
  animation: sparkle 20s linear infinite;
  z-index: 0;
}

@keyframes sparkle {
  from { transform: translateY(0); }
  to { transform: translateY(-200px); }
}


.bouquet {
  position: relative;
  width: 90vw;
  max-width: 360px;
  aspect-ratio: 360 / 520;
  animation: float 4s ease-in-out infinite;
  z-index: 2;
}

@keyframes float {
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}


.title {
  position: absolute;
  top: -5%;
  width: 100%;
  text-align: center;
  font-size: 5vw;
  color: #ad1457;
}

/* PAPEL */
.wrapper {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 75%;
  height: 45%;
  background: linear-gradient(145deg,#f8d7da,#f1b0b7);
  clip-path: polygon(0 0,100% 0,80% 100%,20% 100%);
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  z-index: 5;
}

.ribbon {
  position: absolute;
  bottom: 22%;
  left: 50%;
  transform: translateX(-50%);
  width: 28%;
  height: 10%;
  background: linear-gradient(145deg,#ffcc00,#ffb700);
  border-radius: 20px;
  box-shadow: 0 5px 10px rgba(0,0,0,0.2);
  z-index: 3;
}

/* TEXTO CURVO */
.curve-text {
  position: absolute;
  top: 45%;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  z-index: 6;
}

.curve-text text {
  fill: #e91e63;
  font-size: 22px;
  font-weight: bold;
  letter-spacing: 2px;
}

/* FLORES */
.flower {
  position: absolute;
  width: 20%;
  aspect-ratio: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 4;
}

.petal {
  position: absolute;
  width: 28%;
  height: 55%;
  background: radial-gradient(circle,#fff176,#fbc02d);
  border-radius: 50%;
}

.center {
  width: 28%;
  height: 28%;
  background: radial-gradient(circle, #5d4037, #3e2723);
  border-radius: 50%;
  z-index: 5;
}

/* TALLOS */
.stem {
  position: absolute;
  width: 6%;
  height: 200%;
  background: linear-gradient(#2e7d32,#1b5e20);
  top: 40%;
}

/* HOJAS */
.leaf {
  position: absolute;
  width: 35%;
  height: 18%;
  background: linear-gradient(145deg,#43a047,#2e7d32);
  border-radius: 50%;
}

.leaf.left {
  top: 70%;
  left: -20%;
  transform: rotate(-30deg);
}

.leaf.right {
  top: 85%;
  right: -20%;
  transform: rotate(30deg);
}

/* MENSAJE */
.message {
  margin-top: 20px;
  width: 85%;
  max-width: 400px;
  text-align: center;
  color: #6a1b4d;
}

.message p {
  margin: 8px 0;
  font-size: 4vw;
}

.frase {
  font-style: italic;
}

/* CURSOR */
.cursor {
  display: inline-block;
  width: 2px;
  background: #6a1b4d;
  animation: blink 1s infinite;
}

@keyframes blink {
  0%,50%,100%{opacity:1}
  25%,75%{opacity:0}
}

/* CORAZONES */
.heart {
  position: absolute;
  color: #ff4081;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-250px); opacity: 0; }
}
</style>
</head>

<body>

<div class="bouquet" id="bouquet">
  <div class="title">Para ti, mi amor 💖</div>

  <svg class="curve-text" viewBox="0 0 300 200">
    <path id="curve" d="M 40 140 Q 150 40 260 140" fill="transparent"/>
    <text text-anchor="middle">
      <textPath href="#curve" startOffset="50%">
        TE AMO MI VIDA  💖
      </textPath>
    </text>
  </svg>

  <div class="wrapper"></div>
  <div class="ribbon"></div>
</div>

<div class="message">
  <p id="t1"></p>
  <p id="t2"></p>
  <p id="t3"></p>
  <p id="t4" class="frase"></p>
  <p id="t5"></p>
  <span class="cursor"></span>
</div>

<script>
const bouquet = document.getElementById("bouquet");

/* TEXTO ANIMADO */
const textos = [
  "Te amo muchísimo 💖",
  "Perdón si estas flores no son reales,",
  "pero están hechas con todo mi amor para ti 🌸",
  '"Vi esta flor porque es bonita... a mí no me gustó, pero pensé que a ti sí, porque tú eres bonita."',
  "— Shrek 💚"
];

const elementos = [t1,t2,t3,t4,t5];

let l=0,c=0;

function escribir(){
  if(l<textos.length){
    if(c<textos[l].length){
      elementos[l].textContent += textos[l][c++];
      setTimeout(escribir,35);
    } else {
      l++; c=0;
      setTimeout(escribir,500);
    }
  }
}
escribir();

/* FLORES */
function createFlower(x,y){
  const flower = document.createElement("div");
  flower.classList.add("flower");
  flower.style.left = x+"%";
  flower.style.top = y+"%";

  const stem = document.createElement("div");
  stem.classList.add("stem");
  flower.appendChild(stem);

  const leaf1 = document.createElement("div");
  leaf1.classList.add("leaf","left");

  const leaf2 = document.createElement("div");
  leaf2.classList.add("leaf","right");

  flower.appendChild(leaf1);
  flower.appendChild(leaf2);

  for(let i=0;i<10;i++){
    const p=document.createElement("div");
    p.classList.add("petal");
    p.style.transform=`rotate(${i*36}deg) translateY(-60%)`;
    flower.appendChild(p);
  }

  const center=document.createElement("div");
  center.classList.add("center");
  flower.appendChild(center);

  bouquet.appendChild(flower);
}

[
  [40,5],[25,15],[55,15],
  [15,30],[40,28],[65,30],
  [20,45],[35,42],[50,42],[65,45]
].forEach(p=>createFlower(p[0],p[1]));

/* MUCHOS CORAZONES 💖 */
setInterval(()=>{
  for(let i=0;i<3;i++){
    const h=document.createElement("div");
    h.className="heart";
    h.innerHTML = Math.random() > 0.5 ? "💖" : "💗";

    h.style.left = Math.random()*100 + "vw";
    h.style.fontSize = (12 + Math.random()*18) + "px";
    h.style.animationDuration = (3 + Math.random()*2) + "s";

    document.body.appendChild(h);

    setTimeout(()=>h.remove(),5000);
  }
},300);

/* CLICK */
document.body.onclick=()=>{
  alert("💖 Eres lo más bonito que me ha pasado, desde ese dia que llegamos a jugar parkour fue lo mejor que me ha pasado en esta vida , te amo mucho mi Dani 💖");
};
</script>

</body>
</html>
